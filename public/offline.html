<!doctype html>
<!-- Static offline fallback served by the service worker (sw.js). It must be a
     self-contained document (inline CSS, no Next runtime, no hashed assets) so
     it can be precached at install time — the sanctioned exception to the
     "UI text via i18n" rule. Copy is bilingual: JS picks es/en from the URL
     the user was navigating to, defaulting to Spanish. -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyList — Sin conexión</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #0a0a0a;
        --muted: #737373;
        --primary: #7c3aed;
        --border: #e5e5e5;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --fg: #fafafa;
          --muted: #a3a3a3;
          --border: #262626;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        padding: 24px;
      }
      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        max-width: 420px;
        width: 100%;
        border: 1px dashed var(--border);
        border-radius: 12px;
        padding: 48px 24px;
        text-align: center;
      }
      .wordmark {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.04em;
      }
      .wordmark span { color: var(--primary); }
      h1 { font-size: 16px; font-weight: 600; margin: 8px 0 0; }
      p { font-size: 14px; color: var(--muted); margin: 0; }
      button {
        margin-top: 12px;
        border: 0;
        border-radius: 8px;
        background: var(--primary);
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        padding: 10px 20px;
        cursor: pointer;
      }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="wordmark">my<span>list</span></div>
      <h1 id="title">Sin conexión</h1>
      <p id="desc">Parece que no tienes internet. Tus datos siguen a salvo — vuelve a intentarlo cuando recuperes la conexión.</p>
      <button id="retry" type="button" onclick="location.reload()">Reintentar</button>
    </div>
    <script>
      // The SW serves this page for any failed navigation; the original URL
      // keeps its locale prefix, so we can localize without a framework.
      if (location.pathname.split("/")[1] === "en") {
        document.documentElement.lang = "en";
        document.title = "MyList — You're offline";
        document.getElementById("title").textContent = "You're offline";
        document.getElementById("desc").textContent =
          "Looks like you have no internet. Your data is safe — try again once you're back online.";
        document.getElementById("retry").textContent = "Try again";
      }
    </script>
  </body>
</html>
